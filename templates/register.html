{% extends "layout.html" %}
{% block content %}
<div class="auth-card">
    <div style="text-align: center; margin-bottom: 2rem;">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" style="height: 80px; margin-bottom: 1rem;">
        <div class="logo-text" style="font-size: 1.1rem; letter-spacing: 1px; color: var(--accent-secondary);">SYSTEM ENROLLMENT</div>
        <p style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 5px;">Auditor General Eswatini</p>
    </div>
    <form method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <div class="form-group">
            <label>Initial Role</label>
            <select name="role">
                <option value="User">Standard User</option>
                <option value="Admin">Administrator</option>
                <option value="Auditor">Auditor</option>
            </select>
        </div>
        <button type="submit" class="btn-primary">Create Account</button>
    </form>
    <p style="text-align:center; margin-top:1.5rem; font-size:0.8rem; color: var(--text-secondary);">
        Already have access? <a href="{{ url_for('login') }}" style="color: var(--accent-secondary);">Login here</a>
    </p>
</div>
{% endblock %}
